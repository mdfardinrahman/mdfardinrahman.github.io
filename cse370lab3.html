<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL JOINS Visualizer</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

[data-theme="dark"]{
--bg:#06060c;--surface:#0e0e18;--surface2:#161624;--border:#252540;
--text:#eeeef6;--muted:#8585a8;--accent:#7c6aef;--accent2:#00e0d0;
--left:#ff7b5f;--right:#3d9df7;--both:#b0a4ff;--null-c:#555580;
--glow:rgba(124,106,239,0.25);--shadow:rgba(0,0,0,0.5);
--card-bg:rgba(14,14,24,0.7);--code-bg:#0c0c16;
--toggle-bg:#1a1a30;--toggle-knob:#eeeef6;
--venn-left-fill:rgba(255,123,95,0.18);--venn-right-fill:rgba(61,157,247,0.18);--venn-both-fill:rgba(176,164,255,0.2);
--row-left:rgba(255,123,95,0.08);--row-right:rgba(61,157,247,0.08);--row-both:rgba(176,164,255,0.1);
}
[data-theme="light"]{
--bg:#f4f3f9;--surface:#ffffff;--surface2:#eeedf5;--border:#d8d6e3;
--text:#1a1a2e;--muted:#6b6b8a;--accent:#6548e8;--accent2:#00a89e;
--left:#e05a3a;--right:#1a7ad9;--both:#6548e8;--null-c:#9999b0;
--glow:rgba(101,72,232,0.15);--shadow:rgba(100,100,140,0.12);
--card-bg:rgba(255,255,255,0.85);--code-bg:#f8f7fd;
--toggle-bg:#d8d6e3;--toggle-knob:#1a1a2e;
--venn-left-fill:rgba(224,90,58,0.15);--venn-right-fill:rgba(26,122,217,0.15);--venn-both-fill:rgba(101,72,232,0.15);
--row-left:rgba(224,90,58,0.07);--row-right:rgba(26,122,217,0.07);--row-both:rgba(101,72,232,0.08);
}

html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden;transition:background .5s,color .4s}

.grain{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;opacity:.025;
background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E")}

.theme-toggle{position:fixed;top:24px;right:24px;z-index:1000;cursor:pointer;
width:76px;height:40px;border-radius:100px;background:var(--toggle-bg);border:2px solid var(--border);
display:flex;align-items:center;padding:3px;transition:all .4s ease;box-shadow:0 4px 24px var(--shadow)}
.theme-toggle:hover{transform:scale(1.1);box-shadow:0 8px 36px var(--glow)}
.theme-toggle:active{transform:scale(0.94)}
.toggle-track{position:relative;width:100%;height:100%;display:flex;align-items:center}
.toggle-knob{width:30px;height:30px;border-radius:50%;
transition:all .5s cubic-bezier(0.68,-0.55,0.27,1.55);display:flex;align-items:center;justify-content:center;
position:absolute;left:2px}
[data-theme="dark"] .toggle-knob{left:2px}
[data-theme="light"] .toggle-knob{left:calc(100% - 32px)}
.toggle-sun,.toggle-moon{position:absolute;transition:all .4s ease}
[data-theme="dark"] .toggle-sun{opacity:0;transform:rotate(-90deg) scale(0.5)}
[data-theme="dark"] .toggle-moon{opacity:1;transform:rotate(0) scale(1)}
[data-theme="light"] .toggle-sun{opacity:1;transform:rotate(0) scale(1)}
[data-theme="light"] .toggle-moon{opacity:0;transform:rotate(90deg) scale(0.5)}
.toggle-bg-icons{display:flex;justify-content:space-between;align-items:center;width:100%;padding:0 8px;pointer-events:none}
.toggle-bg-icons svg{width:16px;height:16px;opacity:.35}
[data-theme="dark"] .toggle-bg-icons .tbi-moon{opacity:0}
[data-theme="light"] .toggle-bg-icons .tbi-sun{opacity:0}
.toggle-glow-ring{position:absolute;inset:-8px;border-radius:100px;
background:radial-gradient(ellipse at center,var(--glow),transparent 70%);opacity:0;transition:opacity .3s;pointer-events:none}
.theme-toggle:hover .toggle-glow-ring{opacity:1}

.toggle-knob-inner{width:30px;height:30px;border-radius:50%;background:var(--toggle-knob);
display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px var(--shadow);position:relative;overflow:hidden}
.toggle-knob-inner::after{content:'';position:absolute;inset:0;border-radius:50%;
background:linear-gradient(135deg,rgba(255,255,255,0.2),transparent);pointer-events:none}
.knob-icon{width:18px;height:18px;position:absolute;transition:all .4s ease}
[data-theme="dark"] .knob-sun{opacity:0;transform:rotate(-90deg) scale(0)}
[data-theme="dark"] .knob-moon{opacity:1;transform:rotate(0) scale(1);color:var(--bg)}
[data-theme="light"] .knob-sun{opacity:1;transform:rotate(0) scale(1);color:var(--bg)}
[data-theme="light"] .knob-moon{opacity:0;transform:rotate(90deg) scale(0)}

header{text-align:center;padding:90px 20px 55px;position:relative}
header::before{content:'';position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:900px;height:450px;
background:radial-gradient(ellipse,var(--glow),transparent 70%);pointer-events:none;opacity:.7}
header h1{font-size:clamp(3rem,7vw,5.5rem);font-weight:900;letter-spacing:-4px;line-height:1;
background:linear-gradient(135deg,var(--text) 0%,var(--accent) 45%,var(--accent2) 100%);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:18px;
filter:drop-shadow(0 4px 30px var(--glow))}
header p{color:var(--muted);font-size:1.25rem;font-weight:300;letter-spacing:.3px}
header .badge{display:inline-block;margin-top:22px;padding:10px 26px;border-radius:100px;
font-size:.85rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;
background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;
box-shadow:0 4px 24px var(--glow)}

.nav-tabs{display:flex;justify-content:center;gap:8px;padding:24px 20px;flex-wrap:wrap;position:sticky;top:0;z-index:100;
border-bottom:1px solid var(--border);transition:background .5s}
[data-theme="light"] .nav-tabs{background:rgba(244,243,249,0.92);backdrop-filter:blur(20px)}
[data-theme="dark"] .nav-tabs{background:rgba(6,6,12,0.88);backdrop-filter:blur(20px)}
.nav-tab{padding:15px 36px;border:2px solid var(--border);border-radius:100px;background:transparent;color:var(--muted);
font-family:'Outfit',sans-serif;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;position:relative;overflow:hidden}
.nav-tab::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--accent),var(--accent2));opacity:0;transition:opacity .3s}
.nav-tab:hover{border-color:var(--accent);color:var(--text);transform:translateY(-2px);box-shadow:0 6px 28px var(--glow)}
.nav-tab.active{border-color:transparent;color:#fff;transform:translateY(-2px);box-shadow:0 8px 32px var(--glow)}
.nav-tab.active::before{opacity:1}
.nav-tab span{position:relative;z-index:1}

.container{max-width:1200px;margin:0 auto;padding:24px}

.join-section{display:none;animation:fadeUp .5s ease}
.join-section.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

.section-header{text-align:center;margin:55px 0 40px}
.section-header h2{font-size:clamp(2.2rem,4.5vw,3.2rem);font-weight:900;letter-spacing:-2px}
.section-header .formula{font-family:'JetBrains Mono',monospace;font-size:1.05rem;font-weight:600;color:var(--accent2);
padding:12px 28px;background:linear-gradient(135deg,rgba(0,224,208,0.06),rgba(124,106,239,0.06));
border:1px solid rgba(0,224,208,0.2);border-radius:100px;display:inline-block;margin-top:16px}
.section-header p.desc{color:var(--muted);margin-top:20px;max-width:720px;margin-left:auto;margin-right:auto;line-height:1.9;font-size:1.15rem}

.sql-box{margin:40px 0;background:var(--surface);border:1px solid var(--border);border-radius:22px;overflow:hidden;
box-shadow:0 10px 50px var(--shadow);transition:background .4s,border-color .4s}
.sql-box-header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--surface2);transition:background .4s}
.sql-box-header .circle{width:13px;height:13px;border-radius:50%}
.sql-box-header .circle:nth-child(1){background:#ff5f57}
.sql-box-header .circle:nth-child(2){background:#febc2e}
.sql-box-header .circle:nth-child(3){background:#28c840}
.sql-box-header span{margin-left:12px;font-size:.9rem;color:var(--muted);font-family:'JetBrains Mono',monospace;font-weight:600}
.sql-box pre{padding:28px 32px;font-family:'JetBrains Mono',monospace;font-size:1.05rem;line-height:2.1;overflow-x:auto;color:var(--text);transition:color .4s}
.sql-box pre .kw{color:var(--accent);font-weight:700}
.sql-box pre .tbl{color:var(--accent2);font-weight:600}
.sql-box pre .col{color:#fdcb6e}
.sql-box pre .alias{color:var(--left)}
.sql-box pre .op{color:var(--left);font-weight:700}

.tables-area{display:grid;grid-template-columns:1fr 1fr;gap:32px;margin:40px 0}
@media(max-width:720px){.tables-area{grid-template-columns:1fr}}
.data-table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:22px;overflow:hidden;
box-shadow:0 6px 30px var(--shadow);transition:all .4s}
.data-table-wrap .table-title{padding:18px 26px;font-weight:800;font-size:1.1rem;border-bottom:1px solid var(--border);
display:flex;align-items:center;gap:11px;background:var(--surface2);transition:background .4s}
.table-title .dot{width:13px;height:13px;border-radius:50%}
.table-title .dot.left{background:var(--left)}
.table-title .dot.right{background:var(--right)}
table{width:100%;border-collapse:collapse;font-family:'JetBrains Mono',monospace;font-size:1rem}
th{padding:16px 22px;text-align:left;color:var(--muted);font-weight:700;border-bottom:1px solid var(--border);font-size:.88rem;text-transform:uppercase;letter-spacing:1.5px}
td{padding:16px 22px;border-bottom:1px solid rgba(42,42,58,0.3);font-weight:500;transition:background .3s;font-size:1rem}
tr.highlight-left td{background:var(--row-left)}
tr.highlight-right td{background:var(--row-right)}
tr.highlight-both td{background:var(--row-both)}
span.null-val{color:var(--null-c);font-style:italic}

.result-area{margin:52px 0}
.result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:16px}
.result-header h3{font-size:1.45rem;font-weight:800;letter-spacing:-.5px}
.step-controls{display:flex;align-items:center;gap:14px}
.step-btn{width:50px;height:50px;border-radius:50%;border:2px solid var(--border);background:var(--surface);
color:var(--text);font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
transition:all .25s;box-shadow:0 3px 16px var(--shadow)}
.step-btn:hover:not(:disabled){background:var(--accent);border-color:var(--accent);color:#fff;transform:scale(1.15);box-shadow:0 8px 30px var(--glow)}
.step-btn:active:not(:disabled){transform:scale(0.93)}
.step-btn:disabled{opacity:.2;cursor:not-allowed}
.step-indicator{font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:700;color:var(--muted);min-width:80px;text-align:center}

.result-table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:22px;overflow:hidden;
box-shadow:0 10px 50px var(--shadow);transition:all .4s}
.result-table-wrap th{background:var(--surface2)}
.result-table-wrap tr.row-entering{animation:rowSlide .45s ease}
@keyframes rowSlide{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}

.explanation-card{background:linear-gradient(135deg,rgba(124,106,239,0.06),rgba(0,224,208,0.06));
border:1px solid rgba(124,106,239,0.18);border-radius:22px;padding:28px 34px;margin:24px 0;
line-height:1.9;color:var(--muted);font-size:1.1rem;transition:all .4s}
.explanation-card strong{color:var(--text)}

.legend{display:flex;gap:28px;justify-content:center;flex-wrap:wrap;margin:28px 0}
.legend-item{display:flex;align-items:center;gap:10px;font-size:.98rem;font-weight:500;color:var(--muted)}
.legend-dot{width:18px;height:18px;border-radius:6px}

.action-btns{display:flex;justify-content:center;gap:12px;margin-top:28px}
.action-btn{border-radius:100px;padding:14px 32px;font-size:1rem;font-family:'Outfit',sans-serif;font-weight:700;
border:2px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;
transition:all .25s;box-shadow:0 3px 16px var(--shadow)}
.action-btn:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-3px);box-shadow:0 8px 30px var(--glow)}
.action-btn:active{transform:scale(0.95)}

footer{text-align:center;padding:80px 20px;color:var(--null-c);font-size:1rem;border-top:1px solid var(--border);margin-top:80px;font-weight:500}
</style>
</head>
<body>
<div class="grain"></div>

<div class="theme-toggle" id="themeToggle" title="Toggle light/dark mode">
  <div class="toggle-glow-ring"></div>
  <div class="toggle-bg-icons">
    <svg class="tbi-sun" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" stroke-linecap="round">
      <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
    <svg class="tbi-moon" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" stroke-linecap="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </div>
  <div class="toggle-knob">
    <div class="toggle-knob-inner">
      <svg class="knob-icon knob-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <svg class="knob-icon knob-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>

  </div>
</div>

<header>
<h1>SQL JOINS<br>Visualizer</h1>
<p>Interactive step-by-step visualization of how SQL JOINs combine data</p>
<div class="badge">CSE370 Lab 3</div>
</header>

<nav class="nav-tabs" id="navTabs"></nav>

<div class="container" id="app"></div>

<footer>CSE370 Lab 3 &mdash; SQL Joins &amp; Constraints &mdash; MySQL &times; XAMPP</footer>

<script>
document.getElementById('themeToggle').addEventListener('click',()=>{
  const html=document.documentElement;
  html.setAttribute('data-theme',html.getAttribute('data-theme')==='dark'?'light':'dark');
});

const studentsData=[
  {id:1,name:'Abrar'},{id:2,name:'Bashir'},{id:3,name:'Cassie'},
  {id:4,name:'Dylan'},{id:5,name:'Erin'},{id:6,name:null}
];
const hobbiesData=[
  {id:2,hobby:'Fishing'},{id:1,hobby:'Singing'},{id:3,hobby:'Gardening'},
  {id:1,hobby:'Gaming'},{id:5,hobby:'Sleeping'},{id:9,hobby:null}
];

const joinTypes=[
  {
    key:'inner',label:'Inner Join',
    formula:'Inner Join = Left ∩ Right',
    desc:'Returns only the rows where there is a matching value in <strong>both</strong> tables. If a row in either table has no match, it is excluded entirely from the result.',
    venn:'intersection',
    compute(){
      const r=[];
      studentsData.forEach(s=>{hobbiesData.forEach(h=>{if(s.id===h.id)r.push({id:s.id,name:s.name,hobby:h.hobby,type:'both'})})});
      return r;
    },
    sql:'<span class="kw">SELECT</span> <span class="alias">t1</span>.<span class="col">name</span>, <span class="alias">t2</span>.<span class="col">hobby</span>\n<span class="kw">FROM</span> <span class="tbl">students</span> <span class="alias">t1</span>\n<span class="kw">JOIN</span> <span class="tbl">hobbies</span> <span class="alias">t2</span>\n  <span class="kw">ON</span> <span class="alias">t1</span>.<span class="col">id</span> <span class="op">=</span> <span class="alias">t2</span>.<span class="col">id</span>;'
  },
  {
    key:'left',label:'Left Join',
    formula:'Left Join = Left ∪ (Left ∩ Right)',
    desc:'Returns <strong>all rows</strong> from the left table, and matching rows from the right table. If no match exists on the right, those columns are filled with <strong>NULL</strong>.',
    venn:'left',
    compute(){
      const r=[];
      studentsData.forEach(s=>{let m=false;hobbiesData.forEach(h=>{if(s.id===h.id){r.push({id:s.id,name:s.name,hobby:h.hobby,type:'both'});m=true}});if(!m)r.push({id:s.id,name:s.name,hobby:null,type:'left-only'})});
      return r;
    },
    sql:'<span class="kw">SELECT</span> <span class="alias">t1</span>.<span class="col">name</span>, <span class="alias">t2</span>.<span class="col">hobby</span>\n<span class="kw">FROM</span> <span class="tbl">students</span> <span class="alias">t1</span>\n<span class="kw">LEFT JOIN</span> <span class="tbl">hobbies</span> <span class="alias">t2</span>\n  <span class="kw">ON</span> <span class="alias">t1</span>.<span class="col">id</span> <span class="op">=</span> <span class="alias">t2</span>.<span class="col">id</span>;'
  },
  {
    key:'right',label:'Right Join',
    formula:'Right Join = Right ∪ (Left ∩ Right)',
    desc:'Returns <strong>all rows</strong> from the right table, and matching rows from the left table. If no match exists on the left, those columns are filled with <strong>NULL</strong>.',
    venn:'right',
    compute(){
      const r=[];
      hobbiesData.forEach(h=>{let m=false;studentsData.forEach(s=>{if(s.id===h.id){r.push({id:h.id,name:s.name,hobby:h.hobby,type:'both'});m=true}});if(!m)r.push({id:h.id,name:null,hobby:h.hobby,type:'right-only'})});
      return r;
    },
    sql:'<span class="kw">SELECT</span> <span class="alias">t1</span>.<span class="col">name</span>, <span class="alias">t2</span>.<span class="col">hobby</span>\n<span class="kw">FROM</span> <span class="tbl">students</span> <span class="alias">t1</span>\n<span class="kw">RIGHT JOIN</span> <span class="tbl">hobbies</span> <span class="alias">t2</span>\n  <span class="kw">ON</span> <span class="alias">t1</span>.<span class="col">id</span> <span class="op">=</span> <span class="alias">t2</span>.<span class="col">id</span>;'
  },
  {
    key:'full',label:'Full Join',
    formula:'Full Join = Left ∪ Right',
    desc:'Returns <strong>all rows</strong> from both tables. Matching rows are combined; unmatched rows from either side get <strong>NULL</strong> for the missing columns.',
    venn:'full',
    compute(){
      const r=[],mr=new Set();
      studentsData.forEach(s=>{let m=false;hobbiesData.forEach((h,i)=>{if(s.id===h.id){r.push({id:s.id,name:s.name,hobby:h.hobby,type:'both'});m=true;mr.add(i)}});if(!m)r.push({id:s.id,name:s.name,hobby:null,type:'left-only'})});
      hobbiesData.forEach((h,i)=>{if(!mr.has(i))r.push({id:h.id,name:null,hobby:h.hobby,type:'right-only'})});
      return r;
    },
    sql:'<span class="kw">SELECT</span> <span class="alias">t1</span>.<span class="col">name</span>, <span class="alias">t2</span>.<span class="col">hobby</span>\n<span class="kw">FROM</span> <span class="tbl">students</span> <span class="alias">t1</span>\n<span class="kw">LEFT JOIN</span> <span class="tbl">hobbies</span> <span class="alias">t2</span>\n  <span class="kw">ON</span> <span class="alias">t1</span>.<span class="col">id</span> <span class="op">=</span> <span class="alias">t2</span>.<span class="col">id</span>\n<span class="kw">UNION</span>\n<span class="kw">SELECT</span> <span class="alias">t1</span>.<span class="col">name</span>, <span class="alias">t2</span>.<span class="col">hobby</span>\n<span class="kw">FROM</span> <span class="tbl">students</span> <span class="alias">t1</span>\n<span class="kw">RIGHT JOIN</span> <span class="tbl">hobbies</span> <span class="alias">t2</span>\n  <span class="kw">ON</span> <span class="alias">t1</span>.<span class="col">id</span> <span class="op">=</span> <span class="alias">t2</span>.<span class="col">id</span>;'
  }
];

const state={activeTab:0,steps:{}};
joinTypes.forEach((_,i)=>{state.steps[i]=0});

function val(v){return v===null||v===undefined?'<span class="null-val">NULL</span>':v}
function valP(v){return v===null||v===undefined?'NULL':v}

function renderNav(){
  document.getElementById('navTabs').innerHTML=joinTypes.map((j,i)=>
    `<button class="nav-tab${i===state.activeTab?' active':''}" onclick="switchTab(${i})"><span>${j.label}</span></button>`
  ).join('');
}

function vennSVG(type){
  const w=420,h=240,cx=w/2,r=90,gap=58;
  const lf=type==='left'||type==='full'?'var(--venn-left-fill)':'none';
  const rf=type==='right'||type==='full'?'var(--venn-right-fill)':'none';
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="max-width:100%">
    <defs><clipPath id="cL-${type}"><circle cx="${cx-gap/2}" cy="${h/2}" r="${r}"/></clipPath></defs>
    <circle cx="${cx-gap/2}" cy="${h/2}" r="${r}" fill="${lf}" stroke="var(--left)" stroke-width="3"/>
    <circle cx="${cx+gap/2}" cy="${h/2}" r="${r}" fill="${rf}" stroke="var(--right)" stroke-width="3"/>
    <circle cx="${cx+gap/2}" cy="${h/2}" r="${r}" fill="var(--venn-both-fill)" clip-path="url(#cL-${type})" stroke="none"/>
    <text x="${cx-gap/2-34}" y="${h/2+5}" fill="var(--left)" font-family="Outfit" font-weight="800" font-size="15" text-anchor="middle">Students</text>
    <text x="${cx+gap/2+34}" y="${h/2+5}" fill="var(--right)" font-family="Outfit" font-weight="800" font-size="15" text-anchor="middle">Hobbies</text>
  </svg>`;
}

function hlClass(t){return t==='both'?'highlight-both':t==='left-only'?'highlight-left':t==='right-only'?'highlight-right':''}

function stepExp(j,row,n,tot){
  if(row.type==='both')
    return `<strong>Step ${n}/${tot}:</strong> Student <strong>${valP(row.name)}</strong> (id=${row.id}) matches Hobby <strong>${valP(row.hobby)}</strong> (id=${row.id}). Both tables have a match &mdash; row is included in the result.`;
  if(row.type==='left-only')
    return `<strong>Step ${n}/${tot}:</strong> Student <strong>${valP(row.name)}</strong> (id=${row.id}) has <strong>no matching hobby</strong>. In a ${j.label}, unmatched left rows are still included with NULL on the right side.`;
  if(row.type==='right-only')
    return `<strong>Step ${n}/${tot}:</strong> Hobby record (id=${row.id}) has <strong>no matching student</strong>. In a ${j.label}, unmatched right rows are still included with NULL on the left side.`;
  return '';
}

function renderSection(idx){
  const j=joinTypes[idx];
  const rows=j.compute();
  const step=state.steps[idx];
  const vis=rows.slice(0,step+1);
  const tot=rows.length;

  const sH=new Set(),hH=new Set();
  vis.forEach(r=>{
    if(r.type==='both'||r.type==='left-only') sH.add(r.id);
    if(r.type==='both'||r.type==='right-only') hobbiesData.forEach((h,i)=>{if(h.id===r.id)hH.add(i)});
  });

  return `
  <div class="join-section${idx===state.activeTab?' active':''}" id="section-${j.key}">
    <div class="section-header">
      <h2>${j.label}</h2>
      <div class="formula">${j.formula}</div>
      <p class="desc">${j.desc}</p>
    </div>

    <div style="display:flex;justify-content:center;margin:40px 0">${vennSVG(j.venn)}</div>

    <div class="sql-box">
      <div class="sql-box-header"><div class="circle"></div><div class="circle"></div><div class="circle"></div><span>query.sql</span></div>
      <pre>${j.sql}</pre>
    </div>

    <div class="tables-area">
      <div class="data-table-wrap">
        <div class="table-title"><div class="dot left"></div>Students (Left Table)</div>
        <table>
          <thead><tr><th>id</th><th>name</th></tr></thead>
          <tbody>${studentsData.map(s=>{
            const hl=sH.has(s.id);
            const c=hl?(rows.some(r=>r.id===s.id&&r.type==='both')?'highlight-both':'highlight-left'):'';
            return `<tr class="${c}"><td>${s.id}</td><td>${val(s.name)}</td></tr>`}).join('')}
          </tbody>
        </table>
      </div>
      <div class="data-table-wrap">
        <div class="table-title"><div class="dot right"></div>Hobbies (Right Table)</div>
        <table>
          <thead><tr><th>id</th><th>hobby</th></tr></thead>
          <tbody>${hobbiesData.map((h,i)=>{
            const hl=hH.has(i);
            const c=hl?(rows.some(r=>r.id===h.id&&r.type==='both')?'highlight-both':'highlight-right'):'';
            return `<tr class="${c}"><td>${h.id}</td><td>${val(h.hobby)}</td></tr>`}).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--row-both);border:2px solid var(--both)"></div>Matched in both</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--row-left);border:2px solid var(--left)"></div>Left only (NULL right)</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--row-right);border:2px solid var(--right)"></div>Right only (NULL left)</div>
    </div>

    <div class="result-area">
      <div class="result-header">
        <h3>Result Table</h3>
        <div class="step-controls">
          <button class="step-btn" onclick="prevStep(${idx})" ${step<=0?'disabled':''}>&#8592;</button>
          <div class="step-indicator">${step+1} / ${tot}</div>
          <button class="step-btn" onclick="nextStep(${idx})" ${step>=tot-1?'disabled':''}>&#8594;</button>
        </div>
      </div>

      <div class="explanation-card">${stepExp(j,rows[step],step+1,tot)}</div>

      <div class="result-table-wrap">
        <table>
          <thead><tr><th>name</th><th>hobby</th></tr></thead>
          <tbody>${vis.map((r,ri)=>{
            const c=hlClass(r.type)+(ri===vis.length-1?' row-entering':'');
            return `<tr class="${c}"><td>${val(r.name)}</td><td>${val(r.hobby)}</td></tr>`}).join('')}
          </tbody>
        </table>
      </div>

      <div class="action-btns">
        <button class="action-btn" onclick="resetSteps(${idx})">&#8634; Reset</button>
        <button class="action-btn" onclick="showAll(${idx})">Show All &#8674;</button>
      </div>
    </div>
  </div>`;
}

function render(){
  renderNav();
  document.getElementById('app').innerHTML=joinTypes.map((_,i)=>renderSection(i)).join('');
}

function switchTab(i){state.activeTab=i;render()}
function nextStep(i){if(state.steps[i]<joinTypes[i].compute().length-1){state.steps[i]++;render()}}
function prevStep(i){if(state.steps[i]>0){state.steps[i]--;render()}}
function resetSteps(i){state.steps[i]=0;render()}
function showAll(i){state.steps[i]=joinTypes[i].compute().length-1;render()}

render();
</script>
</body>
</html>
